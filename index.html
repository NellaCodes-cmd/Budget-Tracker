<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Budget Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>💰 Personal Budget Tracker</h1>

    <div class="container">

        <!-- Balance -->
        <div class="balance-card">
            <h2>CURRENT BALANCE</h2>
            <div class="balance-amount" id="balance">GH₵ 0.00</div>
        </div>

        <!-- Summary -->
        <div class="summary">
            <div class="summary-card">
                <h3>TOTAL INCOME</h3>
                <p class="income-text" id="total-income">GH₵ 0.00</p>
            </div>
            <div class="summary-card">
                <h3>TOTAL EXPENSES</h3>
                <p class="expense-text" id="total-expense">GH₵ 0.00</p>
            </div>
        </div>

        <!-- Form -->
        <div class="form-card">
            <h3>Add Transaction</h3>
            <div class="form-group">
                <label>Description</label>
                <input type="text" id="desc" placeholder="e.g. Salary, Rent, Food...">
            </div>
            <div class="form-group">
                <label>Amount (GH₵)</label>
                <input type="number" id="amount" placeholder="0.00" min="0">
            </div>
            <div class="form-group">
                <label>Type</label>
                <select id="type">
                    <option value="income">Income</option>
                    <option value="expense">Expense</option>
                </select>
            </div>
            <button class="btn-add" onclick="addTransaction()">+ Add Transaction</button>
        </div>

        <!-- Transactions List -->
        <div class="transactions-card">
            <h3>Transaction History</h3>
            <div id="transaction-list">
                <p class="empty-msg">No transactions yet. Add one above!</p>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
